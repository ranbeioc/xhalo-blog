name: Check

on:
  push:
  pull_request:

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run check:all
      - run: npm run check:secrets
      - run: npm test
      - run: npm run test:secrets-fixture
      - run: npm run build:admin
